name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: pot-o-desktop/package-lock.json
      - name: Lint frontend
        run: |
          npm ci
          npm run build
        working-directory: pot-o-desktop

  build-linux:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: pot-o-desktop/package-lock.json
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - name: Build
        run: |
          npm ci
          npm run build
          cargo build --release
        working-directory: pot-o-desktop

  build-macos:
    runs-on: macos-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: pot-o-desktop/package-lock.json
      - name: Build
        run: |
          npm ci
          npm run build
          cargo build --release
        working-directory: pot-o-desktop

  build-windows:
    runs-on: windows-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: pot-o-desktop/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: |
          npm ci
          npm run build
          cargo build --release
        working-directory: pot-o-desktop
